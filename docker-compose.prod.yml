services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A config worker --beat -l info --concurrency=1
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  sqlite_data:
